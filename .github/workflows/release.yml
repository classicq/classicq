name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            target: x86_64-linux-gnu
            artifact: classicq-linux-amd64
            artifact_path: assets/classicq-linux-amd64
          - os: ubuntu-latest
            platform: windows-amd64
            target: x86_64-windows-gnu
            artifact: classicq-windows-amd64.exe
            artifact_path: assets/classicq-windows-amd64.exe
          - os: macos-latest
            platform: macos-arm64
            target: aarch64-macos
            artifact: classicq-macos-arm64
            artifact_path: assets/classicq-macos-arm64.app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f # v2.0.5
        with:
          version: 0.16.0

      - name: Install Linux system dependencies
        if: matrix.target == 'x86_64-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev

      - name: Build release binary
        shell: bash
        run: |
          BUILD_ARGS="-Drelease=true"
          if [ "${{ matrix.platform }}" = "windows-amd64" ]; then
            BUILD_ARGS="-Dtarget=${{ matrix.target }} $BUILD_ARGS"
          fi
          for i in 1 2 3; do
            zig build $BUILD_ARGS && break || {
              echo "::warning::Build attempt $i failed, retrying"
              rm -rf .zig-cache
              sleep 2
            }
          done

      - name: Upload binary artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          retention-days: 1
          if-no-files-found: error

  package-and-release:
    name: Package and create release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.reltype.outputs.prerelease }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download all binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Determine release type
        id: reltype
        run: |
          if [[ "$GITHUB_REF" =~ -(rc|beta|alpha) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pick release body
        id: body
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          case "$TAG" in
            v3.0.0-rc1|v3.0.0)
              echo "PATH=.github/release-notes/v3.0.0.md" >> $GITHUB_OUTPUT
              echo "AUTOGEN=false" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "PATH=" >> $GITHUB_OUTPUT
              echo "AUTOGEN=true" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Assemble per-OS ZIPs
        run: |
          VER=${{ steps.version.outputs.VERSION }}

          mkdir -p assets-base
          cp -r assets/. assets-base/
          rm -f assets-base/classicq-windows-amd64.exe
          rm -f assets-base/classicq-linux-amd64
          rm -rf assets-base/classicq-macos-arm64.app
          cp LICENSE assets-base/
          cp README.md assets-base/

          # Windows ZIP
          PLATFORM="windows-amd64"
          BIN="classicq-windows-amd64.exe"
          STAGE="classicQ-${VER}-${PLATFORM}"
          mkdir -p "$STAGE"
          cp -r assets-base/* "$STAGE/"
          cp "artifacts/${BIN}/${BIN}" "$STAGE/"
          zip -r "${STAGE}.zip" "$STAGE"

          # Linux ZIP
          PLATFORM="linux-amd64"
          BIN="classicq-linux-amd64"
          STAGE="classicQ-${VER}-${PLATFORM}"
          mkdir -p "$STAGE"
          cp -r assets-base/* "$STAGE/"
          cp "artifacts/${BIN}/${BIN}" "$STAGE/"
          chmod +x "$STAGE/${BIN}"
          zip -r "${STAGE}.zip" "$STAGE"

          # macOS ZIP - preserve .app bundle
          PLATFORM="macos-arm64"
          STAGE="classicQ-${VER}-${PLATFORM}"
          APP="$STAGE/classicq-macos-arm64.app"
          mkdir -p "$STAGE" "$APP"
          cp -r assets-base/* "$STAGE/"
          cp -r artifacts/classicq-macos-arm64/. "$APP/"
          chmod +x "$APP/Contents/MacOS/classicq-macos-arm64"
          zip -ry "${STAGE}.zip" "$STAGE"

      - name: Generate SHA256 checksums
        run: |
          sha256sum classicQ-*.zip > SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'classicQ-*.zip'

      - name: Create draft release with assets
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            classicQ-*.zip
            SHA256SUMS
          body_path: ${{ steps.body.outputs.PATH }}
          generate_release_notes: ${{ steps.body.outputs.AUTOGEN }}
          draft: true
          prerelease: ${{ steps.reltype.outputs.prerelease }}

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF#refs/tags/}" --repo "${{ github.repository }}" --draft=false

  update-page:
    name: Update download page
    needs: package-and-release
    if: needs.package-and-release.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Build releases.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VER="${TAG#v}"
          BASE="https://github.com/classicq/classicq/releases/download/${TAG}"
          jq -n \
            --arg ver "$VER" \
            --arg win "$BASE/classicQ-$VER-windows-amd64.zip" \
            --arg lin "$BASE/classicQ-$VER-linux-amd64.zip" \
            --arg mac "$BASE/classicQ-$VER-macos-arm64.zip" \
            '{version: $ver, downloads: {windows: $win, linux: $lin, macos: $mac}}' \
            > releases.json
      - name: Deploy to site repo
        env:
          DEPLOY_KEY: ${{ secrets.SITE_DEPLOY_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/stdin ~/.ssh/key <<< "$DEPLOY_KEY"
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/key -o IdentitiesOnly=yes"
          git clone --depth 1 git@github.com:classicq/classicq.github.io.git site
          install -m 644 releases.json site/releases.json
          cd site
          git add releases.json
          git -c user.name=github-actions -c user.email=github-actions@users.noreply.github.com \
            commit -m "Update releases.json for $TAG" || { echo "No changes"; exit 0; }
          git push
